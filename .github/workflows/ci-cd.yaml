name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.anujaayare }}
        password: ${{ secrets.Anujasaptarshiayare@2026 }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.anujaayare }}/nodejs-app:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.anujaayare }}/nodejs-app:latest

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
